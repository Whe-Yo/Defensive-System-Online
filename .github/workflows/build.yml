name: build

on:
  push:
    tags: ["v*"]          # tag push -> attach binaries to a GitHub Release
  workflow_dispatch: {}    # manual run -> binaries as downloadable artifacts

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: dso-linux
            binary: dso
          - os: windows-latest
            artifact: dso-windows
            binary: dso.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build
        run: pyinstaller build/dso.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.binary }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
